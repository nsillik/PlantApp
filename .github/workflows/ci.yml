name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: swiftlint lint

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: tuist install
      - run: tuist generate
      - run: tuist build

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: tuist install
      - run: tuist generate
      - run: tuist test
      - name: Upload snapshot failures (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: |
            app/Tests/VerdigrisTests/__Snapshots__/
            app/Tests/VerdigrisTests/__Snapshots__/**/*.png
